appId: com.reckonlabs.reckconnect.satellite
productName: Reck Connect Satellite
copyright: "© 2026 Reckon Labs"
# Bake RECK_STATION_ROOT into the .app's Info.plist so GUI launches
# (Finder, Spotlight, Dock, `open -a`) inherit it WITHOUT depending on
# `launchctl setenv` (which evaporates on logout/reboot). electron-builder's
# `${env.X}` substitution does NOT fire on `extendInfo`, so a YAML-only
# approach would land the literal string in Info.plist; scripts/after-pack.js
# reads the real env var at pack time and writes it via PlistBuddy.
afterPack: ./scripts/after-pack.js
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.developer-tools
  # Ad-hoc signed (identity "-") so TCC grants (mic, AX) stick across launches.
  # Each user's local build gets its own ad-hoc signature on their machine.
  identity: "-"
  gatekeeperAssess: false
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Reck Connect Satellite needs microphone access so macOS Dictation
      ("voice-to-text") can transcribe speech into terminal panes.
extraMetadata:
  main: dist/main/main.js
